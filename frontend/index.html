<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DandyDash — Gestion AD</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="login-screen">
    <div class="login-card">
      <div class="login-logo">
        <div class="icon">💫</div>
        <h1>DandyDash</h1>
        <p>Gestion de Active Directory</p>
      </div>
      <div class="field">
        <label>Usuario</label>
        <input id="usr" type="text" placeholder="admin" autocomplete="username">
      </div>
      <div class="field">
        <label>Contraseña</label>
        <input id="pwd" type="password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <div id="mfabox" class="field" style="display:none">
        <label>Código MFA (Google Authenticator)</label>
        <input id="totp" type="text" placeholder="123456" maxlength="6" inputmode="numeric">
        <p class="mfa-hint">Abre la app y copia el código de 6 dígitos</p>
      </div>
      <button class="btn btn-primary" onclick="doLogin()">Entrar</button>
      <p class="error-msg" id="errmsg"></p>
    </div>
  </div>

  <div id="app">
    <nav class="topbar">
      <span class="topbar-brand">💫 DandyDash</span>
      <div class="topbar-nav">
        <button class="nav-btn" data-section="dashboard" onclick="loadSection('dashboard')">Dashboard</button>
        <button class="nav-btn" data-section="users"     onclick="loadSection('users')">Usuarios</button>
        <button class="nav-btn" data-section="groups"    onclick="loadSection('groups')">Grupos</button>
        <button class="nav-btn" data-section="ous"       onclick="loadSection('ous')">OUs</button>
      </div>
      <div class="topbar-right">
        <span class="topbar-user" id="topbar-username"></span>
        <button class="btn-logout" onclick="doLogout()">Salir</button>
      </div>
    </nav>
    <div class="main">
      <div id="content"></div>
    </div>
  </div>

  <div id="modal" class="modal-backdrop" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <h3 id="modal-title"></h3>
      <div id="modal-body"></div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
        <button class="btn btn-primary" id="modal-ok" style="width:auto;padding:10px 20px">Guardar</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
