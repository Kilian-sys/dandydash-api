---
# ═══════════════════════════════════════════════════════
#  DandyDash API — Ansible Role Tasks
#  Incluye: dependencias, API Flask, Nginx, SSSD+Samba4
# ═══════════════════════════════════════════════════════

# ── 1. Dependencias del sistema ───────────────────────
- name: Actualizar cache APT
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Instalar paquetes base
  apt:
    name:
      # Python y build
      - python3
      - python3-pip
      - python3-venv
      - python3-dev
      - build-essential
      - libldap2-dev
      - libsasl2-dev
      - libssl-dev
      # PostgreSQL
      - postgresql
      - postgresql-contrib
      - python3-psycopg2
      - acl
      # Nginx
      - nginx
      # Integracion AD / SSSD
      - sssd
      - sssd-ad
      - sssd-tools
      - realmd
      - adcli
      - samba-common-bin
      - oddjob
      - oddjob-mkhomedir
      - packagekit
      - krb5-user
      # Utilidades
      - rsync
      - git
      - curl
    state: present

# ── 2. Usuario de la aplicacion ───────────────────────
- name: Crear usuario del sistema para la API
  user:
    name:       "{{ app_user }}"
    system:     yes
    shell:      /bin/false
    home:       "{{ app_dir }}"
    create_home: yes

# ── 3. PostgreSQL ─────────────────────────────────────
- name: Iniciar y habilitar PostgreSQL
  service:
    name:    postgresql
    state:   started
    enabled: yes

- name: Crear usuario PostgreSQL
  become_user: postgres
  postgresql_user:
    name:     "{{ db_user }}"
    password: "{{ db_password }}"
    state:    present

- name: Crear base de datos PostgreSQL
  become_user: postgres
  postgresql_db:
    name:  "{{ db_name }}"
    owner: "{{ db_user }}"
    state: present

# ── 4. Codigo de la API ───────────────────────────────
- name: Crear directorio de la aplicacion
  file:
    path:  "{{ app_dir }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode:  "0755"

- name: Copiar codigo fuente de la API
  synchronize:
    src:     "{{ playbook_dir }}/../app/"
    dest:    "{{ app_dir }}/app/"
    rsync_opts:
      - "--chown={{ app_user }}:{{ app_user }}"

- name: Copiar requirements.txt
  copy:
    src:   "{{ playbook_dir }}/../requirements.txt"
    dest:  "{{ app_dir }}/requirements.txt"
    owner: "{{ app_user }}"

# ── 5. Entorno virtual Python ─────────────────────────
- name: Crear entorno virtual
  become_user: "{{ app_user }}"
  command: python3 -m venv {{ app_dir }}/venv
  args:
    creates: "{{ app_dir }}/venv/bin/activate"

- name: Instalar dependencias Python
  become_user: "{{ app_user }}"
  pip:
    requirements: "{{ app_dir }}/requirements.txt"
    virtualenv:   "{{ app_dir }}/venv"
    state:        present

# ── 6. Fichero .env de configuracion ─────────────────
- name: Crear fichero .env con configuracion
  template:
    src:   dandydash.env.j2
    dest:  "{{ app_dir }}/.env"
    owner: "{{ app_user }}"
    mode:  "0640"

# ── 7. Servicio systemd ───────────────────────────────
- name: Crear unidad systemd para la API
  template:
    src:  dandydash-api.service.j2
    dest: /etc/systemd/system/dandydash-api.service
    mode: "0644"

- name: Recargar systemd y habilitar servicio
  systemd:
    name:          dandydash-api
    daemon_reload: yes
    enabled:       yes
    state:         restarted

# ── 8. Frontend estatico ──────────────────────────────
- name: Crear directorios del frontend
  file:
    path:  "{{ item }}"
    state: directory
    owner: "{{ app_user }}"
    mode:  "0755"
  loop:
    - "{{ frontend_dir }}"
    - "{{ frontend_dir }}/css"
    - "{{ frontend_dir }}/js"

- name: Copiar ficheros del frontend
  copy:
    src:   "{{ playbook_dir }}/../frontend/{{ item.src }}"
    dest:  "{{ frontend_dir }}/{{ item.dest }}"
    owner: "{{ app_user }}"
    mode:  "0644"
  loop:
    - { src: "index.html",    dest: "index.html" }
    - { src: "css/style.css", dest: "css/style.css" }
    - { src: "js/app.js",     dest: "js/app.js" }

# ── 9. Certificado SSL autofirmado ────────────────────
- name: Crear directorio SSL
  file:
    path:  /etc/ssl/dandydash
    state: directory
    mode:  "0750"

- name: Generar certificado SSL autofirmado
  command: >
    openssl req -x509 -nodes -days 3650 -newkey rsa:2048
    -keyout {{ ssl_key }} -out {{ ssl_cert }}
    -subj "/C=ES/ST=Cataluna/L=Barcelona/O=DandyDash/CN=dandydash.local"
  args:
    creates: "{{ ssl_cert }}"

# ── 10. Nginx ─────────────────────────────────────────
- name: Crear configuracion Nginx
  template:
    src:  nginx-dandydash.conf.j2
    dest: /etc/nginx/sites-enabled/dandydash
    mode: "0644"

- name: Eliminar site por defecto de Nginx
  file:
    path:  /etc/nginx/sites-enabled/default
    state: absent

- name: Verificar y recargar Nginx
  command: nginx -t
  notify: reload nginx

- name: Habilitar e iniciar Nginx
  service:
    name:    nginx
    enabled: yes
    state:   started

# ── 11. SSSD — Integracion con Samba4 AD ─────────────
- name: Crear configuracion SSSD para Samba4
  template:
    src:  sssd.conf.j2
    dest: /etc/sssd/sssd.conf
    owner: root
    group: root
    mode:  "0600"

- name: Crear configuracion Kerberos
  template:
    src:  krb5.conf.j2
    dest: /etc/krb5.conf
    mode: "0644"

- name: Habilitar creacion automatica de home al login AD
  command: pam-auth-update --enable mkhomedir
  changed_when: false

- name: Habilitar e iniciar SSSD
  service:
    name:    sssd
    enabled: yes
    state:   restarted

- name: Verificar que SSSD puede resolver usuarios del AD
  command: "id administrator@{{ ldap_domain }}"
  register: sssd_test
  failed_when: false
  changed_when: false

- name: Mostrar resultado test SSSD
  debug:
    msg: "SSSD test: {{ sssd_test.stdout | default(sssd_test.stderr) }}"

# ── 12. Sudoers para admins del AD ───────────────────
- name: Permitir sudo a Domain Admins
  copy:
    content: |
      # Domain Admins de dandydash.local tienen sudo completo
      %domain\ admins@dandydash.local ALL=(ALL) ALL
    dest:  /etc/sudoers.d/dandydash-ad
    mode:  "0440"
    validate: "visudo -cf %s"

# ── 13. Firewall UFW ──────────────────────────────────
- name: Instalar UFW
  apt:
    name:  ufw
    state: present

- name: Permitir SSH
  ufw:
    rule: allow
    port: "22"

- name: Permitir HTTPS
  ufw:
    rule: allow
    port: "443"

- name: Permitir HTTP (redireccion a HTTPS)
  ufw:
    rule: allow
    port: "80"

- name: Permitir WireGuard
  ufw:
    rule:     allow
    port:     "51820"
    proto:    udp

- name: Activar UFW
  ufw:
    state: enabled

